# Nav2 params for ros2dreame (Dreame W10). Real robot, no sim time.
# Robot: differential drive, ~350 mm diameter (radius ~0.175 m), full 360 deg
# LDS on /scan (8 m), odom -> base_link (/tf), commands on /cmd_vel. The on-robot
# driver clamps to 0.15 m/s + 1.5 rad/s and stops on cliff/bump, so Nav2 velocity
# limits are kept under that. Map is served from /cfg/maps (make save-map output);
# AMCL localises the robot in it (set the start pose with rviz "2D Pose Estimate").

amcl:
  ros__parameters:
    use_sim_time: false
    base_frame_id: base_link
    odom_frame_id: odom
    global_frame_id: map
    scan_topic: scan
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    laser_model_type: likelihood_field
    max_particles: 2000
    min_particles: 500
    laser_max_range: 8.0
    laser_min_range: -1.0
    max_beams: 60
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    update_min_a: 0.2
    update_min_d: 0.25
    resample_interval: 1
    transform_tolerance: 1.0
    z_hit: 0.5
    z_rand: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    set_initial_pose: false

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "/cfg/maps/dreame_map.yaml"

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    transform_tolerance: 0.5

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 15.0
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 15.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.2
      stateful: true
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.12
      lookahead_dist: 0.4
      min_lookahead_dist: 0.2
      max_lookahead_dist: 0.6
      use_velocity_scaled_lookahead_dist: true
      lookahead_time: 1.2
      transform_tolerance: 0.2
      min_approach_linear_velocity: 0.03
      approach_velocity_scaling_dist: 0.4
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.6
      regulated_linear_scaling_min_speed: 0.04
      use_rotate_to_heading: true
      rotate_to_heading_angular_vel: 0.8
      rotate_to_heading_min_angle: 0.6
      max_angular_accel: 2.0
      allow_reversing: false
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_link
      update_frequency: 5.0
      publish_frequency: 2.0
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.18
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          obstacle_max_range: 6.0
          raytrace_max_range: 8.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.35
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_link
      update_frequency: 1.0
      publish_frequency: 1.0
      resolution: 0.05
      track_unknown_space: true
      robot_radius: 0.18
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          obstacle_max_range: 6.0
          raytrace_max_range: 8.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.35
      always_send_full_costmap: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.2
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    max_rotational_vel: 1.0
    min_rotational_vel: 0.2
    rotational_acc_lim: 2.0

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 15.0
    feedback: "OPEN_LOOP"
    max_velocity: [0.13, 0.0, 1.2]
    min_velocity: [-0.13, 0.0, -1.2]
    max_accel: [0.5, 0.0, 2.0]
    max_decel: [-0.5, 0.0, -2.0]
    odom_topic: "odom"
    odom_duration: 0.1

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names: ["map_server", "amcl"]

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names: ["controller_server", "planner_server", "behavior_server", "bt_navigator", "velocity_smoother"]
